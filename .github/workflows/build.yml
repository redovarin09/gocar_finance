name: Build GocarFinance APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Bootstrap Android scaffold via flutter create
        run: |
          flutter create \
            --platforms=android \
            --org com.gocarfinance \
            --project-name gocar_finance \
            /tmp/gocar_scaffold
          cp -r /tmp/gocar_scaffold/android ./android
          sed -i \
            's/android:label="gocar_finance"/android:label="GocarFinance"/' \
            android/app/src/main/AndroidManifest.xml

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gocar-finance-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
