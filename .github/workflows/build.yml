name: Build GocarFinance APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Bootstrap Android scaffold
        run: |
          flutter create \
            --platforms=android \
            --org com.gocarfinance \
            --project-name gocar_finance \
            /tmp/gocar_scaffold
          cp -r /tmp/gocar_scaffold/android ./android
          sed -i \
            's/android:label="gocar_finance"/android:label="GocarFinance"/' \
            android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n    <application|' \
            android/app/src/main/AndroidManifest.xml

      - name: Patch compileSdk and desugaring
        run: |
          python3 scripts/patch_compilesdk.py
          python3 scripts/fix_desugaring.py
          python3 scripts/setup_signing.py

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode \
            > android/app/gocar_finance.jks
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=gocar_finance.jks
          EOF

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install icon tools
        run: |
          sudo apt-get install -y fonts-dejavu-core
          pip install pillow --quiet

      - name: Generate App Icon
        run: python3 scripts/gen_icon.py

      - name: Generate Launcher Icons
        run: dart run flutter_launcher_icons

      - name: Generate Splash Screen
        run: dart run flutter_native_splash:create

      - name: Build Release APK (Signed)
        run: flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: GocarFinance-v${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
