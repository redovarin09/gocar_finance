name: gocar_finance
description: Aplikasi pencatatan keuangan harian untuk Driver GoCar
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Database lokal
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Format Rupiah & tanggal
  intl: ^0.19.0

  # Chart dashboard
  fl_chart: ^0.68.0

  # Navigasi
  go_router: ^13.2.0

  # Tipografi
  google_fonts: ^6.2.1

  # Penyimpanan preferensi
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
